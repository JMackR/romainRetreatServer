# Local deploy config (gitignored in this repo — do not commit real secrets).
#
# From romainRetreatServer:
#   yarn sam:build
#   sam deploy
#   # later: sam deploy --config-env default

version = 0.1

[default.global.parameters]
stack_name = "romain-retreat-subgraph"
region = "us-east-1"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
# Required stack parameters (see template.yaml). Replace PayloadSecret before deploy.
# Include PayloadSecret (required). No Vpc* keys — attach VPC in Lambda console if needed.
parameter_overrides = "DatabaseUrl=\"postgresql://postgres@database-1-instance-1.cq5m8kimg8gg.us-east-1.rds.amazonaws.com:5432/postgres?sslmode=require\" PayloadSecret=\"YOUR_PAYLOAD_SECRET_HERE\" UseRdsIamAuth=\"false\" RdsDbiResourceId=\"\" RdsIamDbUser=\"postgres\" PayloadDatabasePush=\"0\""
s3_prefix = "romain-retreat-subgraph"
image_repositories = []

[default.package.parameters]
resolve_s3 = true
