# Local composition (host machine): subgraph must be reachable at these URLs.
# From `romainRetreatServer`: `yarn compose:supergraph`
# Requires: Rover CLI, `APOLLO_ELV2_LICENSE=accept`, and the subgraph server on :3002.
federation_version: '=2.8.0'
subgraphs:
  payload:
    routing_url: http://127.0.0.1:3002/graphql
    schema:
      subgraph_url: http://127.0.0.1:3002/graphql
