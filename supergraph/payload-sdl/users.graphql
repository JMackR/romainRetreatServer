# Split SDL (yarn export:subgraph-sdl) | bucket: users / auth

type User {
  id: Int!
  firstName: String
  lastName: String
  role: User_role
  updatedAt: DateTime
  createdAt: DateTime
  email: EmailAddress!
  resetPasswordToken: String
  resetPasswordExpiration: DateTime
  salt: String
  hash: String
  loginAttempts: Float
  lockUntil: DateTime
  sessions: [User_Sessions!]
}

enum User_role {
  admin
  contentManager
  consumer
}

type User_Sessions {
  id: String
  createdAt: DateTime
  expiresAt: DateTime
}

type Users {
  docs: [User!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

input User_where {
  firstName: User_firstName_operator
  lastName: User_lastName_operator
  role: User_role_operator
  updatedAt: User_updatedAt_operator
  createdAt: User_createdAt_operator
  email: User_email_operator
  sessions__id: User_sessions__id_operator
  sessions__createdAt: User_sessions__createdAt_operator
  sessions__expiresAt: User_sessions__expiresAt_operator
  id: User_id_operator
  AND: [User_where_and]
  OR: [User_where_or]
}

input User_firstName_operator {
  equals: String
  not_equals: String
  like: String
  contains: String
  in: [String]
  not_in: [String]
  all: [String]
  exists: Boolean
}

input User_lastName_operator {
