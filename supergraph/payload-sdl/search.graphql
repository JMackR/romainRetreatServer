# Split SDL (yarn export:subgraph-sdl) | bucket: search collection

type Search {
  id: Int!
  title: String
  priority: Float
  doc(draft: Boolean): Search_Doc_Relationship
  slug: String
  meta: Search_Meta
  categories: [Search_Categories!]
  updatedAt: DateTime
  createdAt: DateTime
}

type Search_Doc_Relationship {
  relationTo: Search_Doc_RelationTo
  value: Search_Doc
}

enum Search_Doc_RelationTo {
  posts
}

union Search_Doc = Post

type Search_Meta {
  title: String
  description: String
  image: Media
}

type Search_Categories {
  relationTo: String
  categoryID: String
  title: String
  id: String
}

type Searches {
  docs: [Search!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

input Search_where {
  title: Search_title_operator
  priority: Search_priority_operator
  doc: Search_doc_Relation
  slug: Search_slug_operator
  meta__title: Search_meta__title_operator
  meta__description: Search_meta__description_operator
  meta__image: Search_meta__image_operator
  categories__relationTo: Search_categories__relationTo_operator
  categories__categoryID: Search_categories__categoryID_operator
  categories__title: Search_categories__title_operator
  categories__id: Search_categories__id_operator
  updatedAt: Search_updatedAt_operator
  createdAt: Search_createdAt_operator
  id: Search_id_operator
  AND: [Search_where_and]
  OR: [Search_where_or]
}

