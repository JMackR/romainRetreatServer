# Legacy unified composition (single "payload" subgraph on :3002).
# Useful when iterating Payload + Hono on the host without 5 per-domain processes.
# Most users should prefer `local.yaml` (cft-style 5 subgraphs).
federation_version: '=2.8.0'
subgraphs:
  payload:
    routing_url: http://127.0.0.1:3002/graphql
    schema:
      subgraph_url: http://127.0.0.1:3002/graphql
