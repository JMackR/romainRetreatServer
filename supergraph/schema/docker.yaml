# Rover composition config when the 5 subgraphs run inside the federation Docker network
# (each service listens on container :4000 — see docker-compose.federation.yml).
# Use from a container on the same network (e.g. the `supergraph-build` one-shot service).
#
#   yarn compose:supergraph:docker  → supergraph/supergraph.docker.graphql
federation_version: '=2.8.0'
subgraphs:
  users:
    routing_url: http://users:4000/graphql
    schema:
      file: ../../subgraphs/users/src/users.graphql
  groups:
    routing_url: http://groups:4000/graphql
    schema:
      file: ../../subgraphs/groups/src/groups.graphql
  search:
    routing_url: http://search:4000/graphql
    schema:
      file: ../../subgraphs/search/src/search.graphql
  content:
    routing_url: http://content:4000/graphql
    schema:
      file: ../../subgraphs/content/src/content.graphql
  system:
    routing_url: http://system:4000/graphql
    schema:
      file: ../../subgraphs/system/src/system.graphql
